name: Build Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────
  # Android APK
  # ───────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiudhiduijiang-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ───────────────────────────────────────────
  # iOS (no code signing — builds app bundle for manual signing)
  # ───────────────────────────────────────────
  build-ios:
    name: Build iOS (No Signing)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r jiudhiduijang.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiudhiduijiang-ios-ipa
          path: jiudhiduijang.ipa
          retention-days: 30

  # ───────────────────────────────────────────
  # Windows
  # ───────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    env:
      CMAKE_GENERATOR: 'Visual Studio 17 2022'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Patch Flutter to use VS 2022 generator
        shell: pwsh
        run: |
          $flutterRoot = ${env:FLUTTER_ROOT} -replace '/', '\'
          $file = Join-Path $flutterRoot "packages\flutter_tools\lib\src\windows\visual_studio.dart"
          if (Test-Path $file) {
            $content = Get-Content $file -Raw
            $content = $content.Replace('Visual Studio 16 2019', 'Visual Studio 17 2022')
            Set-Content $file -Value $content -NoNewline
            Write-Host "Patched visual_studio.dart: VS 2019 -> VS 2022 generator"
            $snapshot = Join-Path $flutterRoot "bin\cache\flutter_tools.snapshot"
            if (Test-Path $snapshot) {
              Remove-Item $snapshot -Force
              Write-Host "Deleted flutter_tools.snapshot to force recompilation"
            }
            $stamp = Join-Path $flutterRoot "bin\cache\flutter_tools.stamp"
            if (Test-Path $stamp) {
              Remove-Item $stamp -Force
            }
          } else {
            Write-Host "Warning: visual_studio.dart not found at $file"
          }

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiudhiduijiang-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30
