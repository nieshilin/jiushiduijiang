name: Build Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────
  # Android APK
  # ───────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiudhiduijiang-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ───────────────────────────────────────────
  # iOS (no code signing — builds app bundle for manual signing)
  # ───────────────────────────────────────────
  build-ios:
    name: Build iOS (No Signing)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiudhiduijiang-ios
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # ───────────────────────────────────────────
  # Windows
  # ───────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    env:
      CMAKE_GENERATOR: 'Visual Studio 17 2022'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiudhiduijiang-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30
