name: jiudhiduijiang
description: "就是对讲 - 局域网跨平台对讲机应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  record: ^6.0.0
  audioplayers: ^6.4.0
  permission_handler: ^11.4.0
  network_info_plus: ^6.1.0
  wakelock_plus: ^1.3.1
  shared_preferences: ^2.5.0
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.0
  phone_state: ^2.0.1
  connectivity_plus: ^6.1.0
  intl: ^0.20.2
  bonsoir: ^6.0.1
  opus_dart: ^3.0.1
  opus_flutter_new: ^3.0.7

dependency_overrides:
  # opus_flutter_new_windows 原始包声明了 pluginClass 但无 windows/ 原生目录，
  # 导致 CMake add_subdirectory 失败。本地 override 去掉 plugin 声明，仅保留 assets。
  opus_flutter_new_windows:
    path: packages/opus_flutter_new_windows

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/splash/
